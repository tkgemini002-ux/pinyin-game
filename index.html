<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Từ Vựng - Luyện Nghe & Nhận Diện Chữ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

        :root {
            --primary: #ff9a9e;
            --secondary: #fecfef;
            --text-main: #5d4037;
            --btn-hover: #ff758c;
            --correct: #a8e6cf;
            --wrong: #ffb6b9;
            --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.4);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            color: #d81b60;
            margin-bottom: 20px;
            font-size: 1.2em;
            border-bottom: 2px dashed var(--primary);
            padding-bottom: 10px;
        }

        .timer {
            background: var(--secondary);
            padding: 5px 15px;
            border-radius: 20px;
            color: #d81b60;
            font-family: monospace;
            font-size: 1.2em;
        }

        /* Thẻ từ vựng hiển thị Icon, Pinyin, Nghĩa */
        .flashcard {
            background: #fff;
            border: 3px solid var(--secondary);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 20px 0 30px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            position: relative;
        }

        .card-audio-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.5);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-audio-btn:hover {
            transform: scale(1.1);
            background: var(--btn-hover);
        }

        .flashcard .icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .flashcard .pinyin {
            font-size: 1.5em;
            color: #d81b60;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .flashcard .meaning {
            font-size: 1.3em;
            color: #4a4a4a;
            font-weight: 600;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-wrapper {
            display: flex;
            gap: 8px;
        }

        .option-btn {
            flex-grow: 1;
            background-color: white;
            color: var(--text-main);
            border: 2px solid var(--secondary);
            padding: 15px 5px;
            font-size: 1.8em; 
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            font-weight: 600;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--secondary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .option-btn.correct { 
            background-color: var(--correct) !important; 
            border-color: #388e3c !important; 
            color: #1b5e20; 
            transform: scale(1.05);
        }
        
        .option-btn.wrong { 
            background-color: var(--wrong) !important; 
            border-color: #d32f2f !important; 
            color: #b71c1c; 
            opacity: 0.5; 
            cursor: not-allowed; 
        }

        .opt-audio-btn {
            background: #fff;
            border: 2px solid var(--secondary);
            color: var(--primary);
            border-radius: 15px;
            padding: 0 12px;
            cursor: pointer;
            font-size: 1.2em;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opt-audio-btn:hover { 
            background: var(--secondary); 
            border-color: var(--primary); 
        }

        .action-btn {
            background: linear-gradient(to right, #ff9a9e, #fecfef);
            color: #d81b60;
            border: none;
            padding: 15px 30px;
            font-size: 1.3em;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.5);
            transition: all 0.3s;
            width: 100%;
            display: none;
        }

        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.7);
        }

        .feedback-msg {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: 800;
            min-height: 25px;
            margin-bottom: 15px;
        }

        .result-screen { display: none; }
        .result-screen h2 { color: #d81b60; font-size: 2.5em; margin-bottom: 10px; }
        .result-screen p { font-size: 1.3em; margin: 10px 0; }
        .heart { color: var(--primary); font-size: 1.5em; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header-info">
        <span id="question-count">Câu: 1/43</span>
        <span class="timer" id="timer">00:00</span>
    </div>

    <div class="flashcard">
        <button class="card-audio-btn" onclick="playQuestionAudio()" title="Nghe phát âm">🔊</button>
        <div class="icon" id="card-icon">🤔</div>
        <div class="pinyin" id="card-pinyin">pīn yīn</div>
        <div class="meaning" id="card-meaning">Nghĩa của từ</div>
    </div>
    
    <div class="options" id="options">
        </div>

    <div class="feedback-msg" id="feedback-msg"></div>

    <button class="action-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo 🌸</button>
</div>

<div class="quiz-container result-screen" id="result-box">
    <h2>Hoàn Thành! <span class="heart">💖</span></h2>
    <p id="final-time">Thời gian hoàn thành: 00:00</p>
    <p id="feedback-text">Bạn đã ôn tập trọn vẹn 43 từ vựng. Đỉnh quá đi mất! Hãy duy trì phong độ này nhé.</p>
    <button class="action-btn" style="display: block; margin-top: 30px;" onclick="location.reload()">Luyện tập lại ✨</button>
</div>

<script>
    // Hàm đọc Text-to-Speech (Giọng Phồn Thể Đài Loan)
    function speakText(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.cancel(); 
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Trình duyệt không hỗ trợ phát âm. Vui lòng thử dùng Chrome hoặc Safari!");
        }
    }

    const fullVocabList = [
        { hanzi: "一共", pinyin: "yí gòng", meaning: "Tổng cộng", icon: "🧮" },
        { hanzi: "共", pinyin: "gòng", meaning: "Chung, tổng", icon: "➕" },
        { hanzi: "多少", pinyin: "duō shǎo", meaning: "Bao nhiêu", icon: "❓" },
        { hanzi: "少", pinyin: "shǎo", meaning: "Ít", icon: "🔽" },
        { hanzi: "錢", pinyin: "qián", meaning: "Tiền", icon: "💵" },
        { hanzi: "老闆", pinyin: "lǎo bǎn", meaning: "Ông chủ", icon: "👨‍💼" },
        { hanzi: "闆", pinyin: "bǎn", meaning: "Chủ", icon: "💼" },
        { hanzi: "買", pinyin: "mǎi", meaning: "Mua", icon: "🛒" },
        { hanzi: "盃", pinyin: "bēi", meaning: "Cốc, ly", icon: "🍵" },
        { hanzi: "包子", pinyin: "bāo zi", meaning: "Bánh bao", icon: "🥟" },
        { hanzi: "包", pinyin: "bāo", meaning: "Bao, túi, bọc", icon: "🛍️" },
        { hanzi: "大", pinyin: "dà", meaning: "To, lớn", icon: "🐘" },
        { hanzi: "幫", pinyin: "bāng", meaning: "Giúp đỡ", icon: "🤝" },
        { hanzi: "微波", pinyin: "wéi bō", meaning: "Quay vi sóng", icon: "♨️" },
        { hanzi: "微", pinyin: "wéi", meaning: "Nhỏ, vi", icon: "🔬" },
        { hanzi: "波", pinyin: "bō", meaning: "Sóng", icon: "🌊" },
        { hanzi: "百", pinyin: "bǎi", meaning: "Trăm", icon: "💯" },
        { hanzi: "外袋", pinyin: "wài dài", meaning: "Túi mang đi", icon: "🛍️" },
        { hanzi: "外", pinyin: "wài", meaning: "Ngoài", icon: "🚪" },
        { hanzi: "袋", pinyin: "dài", meaning: "Túi, bao", icon: "🎒" },
        { hanzi: "內用", pinyin: "nèi yòng", meaning: "Dùng tại quán", icon: "🍽️" },
        { hanzi: "支", pinyin: "zhī", meaning: "Lượng từ (cây/chiếc)", icon: "🥢" },
        { hanzi: "新", pinyin: "xīn", meaning: "Mới", icon: "✨" },
        { hanzi: "手機", pinyin: "shǒu jī", meaning: "Điện thoại", icon: "📱" },
        { hanzi: "手", pinyin: "shǒu", meaning: "Tay", icon: "✋" },
        { hanzi: "機", pinyin: "jī", meaning: "Máy móc", icon: "⚙️" },
        { hanzi: "太", pinyin: "tài", meaning: "Quá, lắm", icon: "😩" },
        { hanzi: "舊", pinyin: "jiù", meaning: "Cũ", icon: "🏚️" },
        { hanzi: "了", pinyin: "le", meaning: "Rồi (trợ từ)", icon: "🏁" },
        { hanzi: "種", pinyin: "zhǒng", meaning: "Loại, chủng loại", icon: "🧬" },
        { hanzi: "能", pinyin: "néng", meaning: "Có thể", icon: "💪" },
        { hanzi: "上網", pinyin: "shàng wǎng", meaning: "Lên mạng", icon: "🌐" },
        { hanzi: "上", pinyin: "shàng", meaning: "Lên, trên", icon: "⬆️" },
        { hanzi: "網", pinyin: "wǎng", meaning: "Mạng, lưới", icon: "🕸️" },
        { hanzi: "那", pinyin: "nà", meaning: "Kia, đó", icon: "👉" },
        { hanzi: "貴", pinyin: "guì", meaning: "Đắt, quý", icon: "💎" },
        { hanzi: "賣", pinyin: "mài", meaning: "Bán", icon: "🏷️" },
        { hanzi: "便宜", pinyin: "pián yi", meaning: "Rẻ", icon: "📉" },
        { hanzi: "便", pinyin: "pián", meaning: "Tiện, rẻ", icon: "💸" },
        { hanzi: "宜", pinyin: "yí", meaning: "Phù hợp", icon: "⚖️" },
        { hanzi: "韆", pinyin: "qiān", meaning: "Nghìn", icon: "🎰" },
        { hanzi: "為什麼", pinyin: "wèi shén me", meaning: "Tại sao", icon: "🤷" },
        { hanzi: "為", pinyin: "wèi", meaning: "Vì, để", icon: "❓" }
    ];

    let quizQuestions = [];
    let currentQ = 0;
    let timerInterval;
    let seconds = 0, minutes = 0;

    const iconEl = document.getElementById('card-icon');
    const pinyinEl = document.getElementById('card-pinyin');
    const meaningEl = document.getElementById('card-meaning');
    const optEl = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const countEl = document.getElementById('question-count');
    const timerEl = document.getElementById('timer');
    const msgEl = document.getElementById('feedback-msg');

    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initQuiz() {
        quizQuestions = shuffleArray(fullVocabList); 
        startTimer();
        loadQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            if (seconds === 60) { minutes++; seconds = 0; }
            timerEl.innerText = 
                (minutes < 10 ? '0' + minutes : minutes) + ':' + 
                (seconds < 10 ? '0' + seconds : seconds);
        }, 1000);
    }

    function playQuestionAudio() {
        speakText(quizQuestions[currentQ].hanzi);
    }

    function loadQuestion() {
        nextBtn.style.display = 'none';
        msgEl.innerText = "";
        msgEl.style.color = "inherit";
        optEl.innerHTML = '';
        
        countEl.innerText = `Câu: ${currentQ + 1}/${quizQuestions.length}`;
        
        const currentWord = quizQuestions[currentQ];
        iconEl.innerText = currentWord.icon;
        pinyinEl.innerText = currentWord.pinyin;
        meaningEl.innerText = currentWord.meaning;

        let options = [currentWord];
        
        // THUẬT TOÁN TẠO ĐÁP ÁN NHIỄU THEO SỐ LƯỢNG CHỮ
        const isSingleChar = currentWord.hanzi.length === 1; // Kiểm tra xem từ gốc là đơn hay ghép
        
        let availableDistractors = fullVocabList.filter(word => {
            const isDistSingleChar = word.hanzi.length === 1;
            // Chỉ lấy những từ KHÁC từ gốc và CÙNG nhóm (đơn đi với đơn, ghép đi với ghép)
            return word.hanzi !== currentWord.hanzi && isSingleChar === isDistSingleChar;
        });
        
        availableDistractors = shuffleArray(availableDistractors);
        
        // Lấy 3 đáp án nhiễu từ danh sách đã lọc
        options.push(availableDistractors[0]);
        options.push(availableDistractors[1]);
        options.push(availableDistractors[2]);
        
        options = shuffleArray(options);

        options.forEach((opt) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'option-wrapper';

            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.hanzi;
            btn.onclick = () => checkAnswer(opt.hanzi, currentWord.hanzi, btn);

            const audioBtn = document.createElement('button');
            audioBtn.className = 'opt-audio-btn';
            audioBtn.innerText = '🔊';
            audioBtn.title = 'Nghe chữ này';
            audioBtn.onclick = (e) => {
                e.stopPropagation(); 
                speakText(opt.hanzi);
            };

            wrapper.appendChild(btn);
            wrapper.appendChild(audioBtn);
            optEl.appendChild(wrapper);
        });
    }

    function checkAnswer(selectedHanzi, correctHanzi, btn) {
        if (btn.disabled) return;

        if (selectedHanzi === correctHanzi) {
            btn.classList.add('correct');
            msgEl.innerText = "Chính xác! 🎉";
            msgEl.style.color = "#388e3c";
            
            const allBtns = optEl.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            
            nextBtn.style.display = 'block';
        } else {
            btn.classList.add('wrong');
            btn.disabled = true;
            msgEl.innerText = "Chưa đúng rồi, hãy thử chữ khác nhé! 🥺";
            msgEl.style.color = "#d32f2f";
        }
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        document.getElementById('quiz-box').style.display = 'none';
        const resBox = document.getElementById('result-box');
        resBox.style.display = 'block';
        document.getElementById('final-time').innerText = `Thời gian hoàn thành: ${timerEl.innerText}`;
    }

    initQuiz();
</script>

</body>
</html>
