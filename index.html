<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Trung - Từ Vựng & Ví Dụ Thực Tế</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

        :root {
            --primary: #ff9a9e;
            --secondary: #fecfef;
            --text-main: #5d4037;
            --btn-hover: #ff758c;
            --correct: #a8e6cf;
            --wrong: #ffb6b9;
            --giveup: #ffd194;
            --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.4);
            padding: 30px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            color: #d81b60;
            margin-bottom: 10px;
            font-size: 1.1em;
            border-bottom: 2px dashed var(--primary);
            padding-bottom: 10px;
        }

        .timer {
            background: var(--secondary);
            padding: 5px 15px;
            border-radius: 20px;
            color: #d81b60;
            font-family: monospace;
        }

        .repeat-note {
            font-size: 0.95em;
            color: #d35400;
            font-weight: 800;
            background: #fff3e0;
            padding: 8px 15px;
            border-radius: 15px;
            border: 2px dashed #f39c12;
            margin-bottom: 15px;
            display: none;
        }

        /* Thẻ từ vựng chính */
        .flashcard {
            background: #fff;
            border: 3px solid var(--secondary);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .hanzi-display {
            font-size: 4em;
            color: var(--text-main);
            font-weight: 800;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            margin: 10px 0;
        }

        .audio-icon-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1em;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .audio-icon-btn:hover { transform: scale(1.05); background: var(--btn-hover); }

        /* Khu vực hiển thị sau khi giải đáp */
        .reveal-section {
            display: none;
            text-align: left;
            background: #fffafa;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid var(--secondary);
            margin-bottom: 15px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .vocab-info {
            border-bottom: 2px dashed var(--secondary);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .example-box {
            background: #fdf2e9;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #ff9a9e;
        }

        .example-hanzi { font-size: 1.6em; font-weight: 800; color: #333; margin-bottom: 8px; line-height: 1.4; }
        .example-pinyin { font-size: 1.1em; color: #666; margin-bottom: 5px; }
        .example-meaning { font-size: 1.1em; color: #d81b60; font-weight: 600; }

        .pinyin-input {
            width: 100%;
            padding: 15px;
            font-size: 1.4em;
            border: 3px solid var(--secondary);
            border-radius: 15px;
            text-align: center;
            outline: none;
            background: #fafafa;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .pinyin-input.correct-input { border-color: #388e3c; background: #e8f5e9; }
        .pinyin-input.wrong-input { border-color: #d32f2f; background: #ffebee; animation: shake 0.4s; }
        .pinyin-input.revealed-input { border-color: #e67e22; background: #fff3e0; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .action-btn {
            border: none; padding: 15px; border-radius: 30px; font-size: 1.2em; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .check-btn { background: var(--primary); color: #fff; }
        .giveup-btn { background: #e0c3fc; color: #4a4a4a; }
        .repeat-btn { background: #ffd194; color: #d35400; flex: 1; }
        .next-btn { background: var(--primary); color: #fff; flex: 1; }

        .diff-display { margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 10px; border: 1px solid #ffb6b9; }
        .diff-label { font-weight: 800; color: #888; font-size: 0.9em; }
        .user-val { color: #d32f2f; text-decoration: line-through; margin-right: 10px; }
        .correct-val { color: #388e3c; font-weight: 800; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header-info">
        <span id="question-count">Câu: 1/...</span>
        <span class="timer" id="timer">00:00</span>
    </div>

    <div class="repeat-note" id="repeat-note">Thẻ sẽ lặp lại: 0</div>

    <div class="flashcard">
        <div class="hanzi-display" id="card-hanzi">漢字</div>
        <button class="audio-icon-btn" onclick="playAudio('vocab')">🔊 Nghe từ</button>
    </div>

    <input type="text" id="pinyin-input" class="pinyin-input" placeholder="Gõ pinyin có dấu (VD: jì huà)..." autocomplete="off">
    
    <div class="reveal-section" id="reveal-section">
        <div id="diff-box" style="display:none;" class="diff-display">
            <div class="diff-label">ĐỐI CHIẾU LỖI SAI:</div>
            <div><span class="user-val" id="user-typed"></span> <span class="correct-val" id="correct-pinyin-reveal"></span></div>
        </div>
        
        <div class="vocab-info">
            <div style="font-size: 1.2em;"><strong>Đáp án:</strong> <span id="vocab-pinyin" style="color:#388e3c; font-weight:bold;"></span></div>
            <div style="font-size: 1.2em;"><strong>Nghĩa:</strong> <span id="vocab-meaning"></span></div>
        </div>

        <div class="example-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong style="color:#d35400">VÍ DỤ TRONG CÂU:</strong>
                <button class="audio-icon-btn" style="background:#ff758c" onclick="playAudio('sentence')">🔊 Nghe câu</button>
            </div>
            <div class="example-hanzi" id="ex-hanzi"></div>
            <div class="example-pinyin" id="ex-pinyin"></div>
            <div class="example-meaning" id="ex-meaning"></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="action-btn check-btn" id="check-btn" onclick="handleCheck()">Kiểm tra ✨</button>
        <button class="action-btn giveup-btn" id="giveup-btn" onclick="handleGiveUp()">Xem đáp án 🏳️</button>
        <div id="post-group" style="display:none; gap:10px; width:100%;">
            <button class="action-btn repeat-btn" id="repeat-btn" onclick="addRepeat()">Lặp lại 🔁</button>
            <button class="action-btn next-btn" onclick="loadNext()">Tiếp theo 🌸</button>
        </div>
    </div>
</div>

<div class="quiz-container" id="result-box" style="display:none;">
    <h2>Hoàn Thành! 🏆</h2>
    <p id="final-time" style="font-size:1.5em; font-weight:800; color:#d81b60;"></p>
    <button class="action-btn check-btn" style="width:100%" onclick="location.reload()">Luyện tập lại từ đầu</button>
</div>

<script>
    // Dữ liệu 66 từ vựng chủ đề Công việc, Dự định & Sinh nhật
    const rawData = [
        { h: "計畫", p: "jì huà", m: "Kế hoạch", exH: "你畢業以後有什麼計畫？", exP: "nǐ bì yè yǐ hòu yǒu shén me jì huà?", exM: "Bạn có kế hoạch gì sau khi tốt nghiệp?" },
        { h: "時間", p: "shí jiān", m: "Thời gian", exH: "我現在沒有時間去玩。", exP: "wǒ xiàn zài méi yǒu shí jiān qù wán.", exM: "Bây giờ tôi không có thời gian đi chơi." },
        { h: "先", p: "xiān", m: "Trước", exH: "你先吃飯吧，我等一下再吃。", exP: "nǐ xiān chī fàn ba, wǒ děng yí xià zài chī.", exM: "Bạn ăn cơm trước đi, tôi đợi lát nữa rồi ăn." },
        { h: "念", p: "niàn", m: "Học / Đọc", exH: "他打算去台灣念大學。", exP: "tā dǎ suàn qù tái wān niàn dà xué.", exM: "Anh ấy dự định đến Đài Loan học đại học." },
        { h: "大學", p: "dà xué", m: "Đại học", exH: "這所大學的風景很漂亮。", exP: "zhè suǒ dà xué de fēng jǐng hěn piào liàng.", exM: "Phong cảnh của trường đại học này rất đẹp." },
        { h: "需要", p: "xū yào", m: "Cần / Nhu cầu", exH: "學中文需要很多時間。", exP: "xué zhōng wén xū yào hěn duō shí jiān.", exM: "Học tiếng Trung cần rất nhiều thời gian." },
        { h: "獎學金", p: "jiǎng xué jīn", m: "Học bổng", exH: "他的成績很好，所以拿到獎學金。", exP: "tā de chéng jī hěn hǎo, suǒ yǐ ná dào jiǎng xué jīn.", exM: "Thành tích của anh ấy rất tốt, nên đã lấy được học bổng." },
        { h: "成績", p: "chéng jī", m: "Thành tích / Điểm số", exH: "這次考試你的成績怎麼樣？", exP: "zhè cì kǎo shì nǐ de chéng jī zěn me yàng?", exM: "Điểm số của bạn trong bài thi lần này thế nào?" },
        { h: "學費", p: "xué fèi", m: "Học phí", exH: "這裡的學費比較貴。", exP: "zhè lǐ de xué fèi bǐ jiào guì.", exM: "Học phí ở đây khá đắt." },
        { h: "公司", p: "gōng sī", m: "Công ty", exH: "他哥哥在一家大公司上班。", exP: "tā gē ge zài yì jiā dà gōng sī shàng bān.", exM: "Anh trai anh ấy làm việc ở một công ty lớn." },
        { h: "替", p: "tì", m: "Thay / Cho", exH: "請你替我跟老師說謝謝。", exP: "qǐng nǐ tì wǒ gēn lǎo shī shuō xiè xie.", exM: "Xin bạn hãy thay tôi nói lời cảm ơn với thầy giáo." },
        { h: "希望", p: "xī wàng", m: "Hy vọng", exH: "我希望明年能去台灣玩。", exP: "wǒ xī wàng míng nián néng qù tái wān wán.", exM: "Tôi hy vọng năm sau có thể đi Đài Loan chơi." },
        { h: "以後", p: "yǐ hòu", m: "Sau này / Sau khi", exH: "下課以後我們一起去喝茶。", exP: "xià kè yǐ hòu wǒ men yì qǐ qù hē chá.", exM: "Sau khi tan học chúng ta cùng đi uống trà." },
        { h: "上班", p: "shàng bān", m: "Đi làm", exH: "爸爸每天早上八點去上班。", exP: "bà ba měi tiān zǎo shang bā diǎn qù shàng bān.", exM: "Bố mỗi sáng 8 giờ đi làm." },
        { h: "念書", p: "niàn shū", m: "Đi học / Đọc sách", exH: "他在圖書館念書。", exP: "tā zài tú shū guǎn niàn shū.", exM: "Anh ấy đang học bài ở thư viện." },
        { h: "累", p: "lèi", m: "Mệt", exH: "今天工作很多，我覺得很累。", exP: "jīn tiān gōng zuò hěn duō, wǒ jué de hěn lèi.", exM: "Hôm nay công việc rất nhiều, tôi cảm thấy rất mệt." },
        { h: "語言中心", p: "yǔ yán zhōng xīn", m: "Trung tâm ngôn ngữ", exH: "他在語言中心學中文。", exP: "tā zài yǔ yán zhōng xīn xué zhōng wén.", exM: "Anh ấy học tiếng Trung ở trung tâm ngôn ngữ." },
        { h: "加油", p: "jiā yóu", m: "Cố lên", exH: "明天的比賽你要加油！", exP: "míng tiān de bǐ sài nǐ yào jiā yóu!", exM: "Trận đấu ngày mai bạn phải cố lên!" },
        { h: "工作", p: "gōng zuò", m: "Công việc / Làm việc", exH: "找工作很不容易。", exP: "zhǎo gōng zuò hěn bù róng yì.", exM: "Tìm công việc rất không dễ dàng." },

        { h: "做", p: "zuò", m: "Làm", exH: "週末你喜歡做什麼？", exP: "zhōu mò nǐ xǐ huan zuò shén me?", exM: "Cuối tuần bạn thích làm gì?" },
        { h: "生意", p: "shēng yì", m: "Việc kinh doanh", exH: "他爸爸是做生意的。", exP: "tā bà ba shì zuò shēng yì de.", exM: "Bố anh ấy làm kinh doanh." },
        { h: "這樣", p: "zhè yàng", m: "Như vậy / Thế này", exH: "你這樣做不對。", exP: "nǐ zhè yàng zuò bú duì.", exM: "Bạn làm như vậy là không đúng." },
        { h: "國家", p: "guó jiā", m: "Quốc gia", exH: "你最喜歡哪個國家？", exP: "nǐ zuì xǐ huan nǎ ge guó jiā?", exM: "Bạn thích quốc gia nào nhất?" },
        { h: "試", p: "shì", m: "Thử", exH: "這件衣服很好看，你要試試嗎？", exP: "zhè jiàn yī fu hěn hǎo kàn, nǐ yào shì shi ma?", exM: "Bộ quần áo này rất đẹp, bạn muốn thử không?" },
        { h: "難", p: "nán", m: "Khó", exH: "中文的語法難不難？", exP: "zhōng wén de yǔ fǎ nán bù nán?", exM: "Ngữ pháp tiếng Trung khó không?" },
        { h: "那麼", p: "nà me", m: "Vậy thì / Như thế", exH: "天氣那麼冷，多穿一點。", exP: "tiān qì nà me lěng, duō chuān yì diǎn.", exM: "Thời tiết lạnh như thế, mặc nhiều một chút." },
        { h: "再", p: "zài", m: "Lại / Nữa", exH: "等我吃完飯再去買東西。", exP: "děng wǒ chī wán fàn zài qù mǎi dōng xi.", exM: "Đợi tôi ăn xong rồi hẵng đi mua đồ." },
        { h: "試試看", p: "shì shi kàn", m: "Thử xem", exH: "這個蛋糕很好吃，你試試看！", exP: "zhè ge dàn gāo hěn hǎo chī, nǐ shì shi kàn!", exM: "Cái bánh kem này rất ngon, bạn ăn thử xem!" },

        { h: "門口", p: "mén kǒu", m: "Cổng / Cửa", exH: "我在學校門口等你。", exP: "wǒ zài xué xiào mén kǒu děng nǐ.", exM: "Tôi đợi bạn ở cổng trường." },
        { h: "西班牙", p: "xī bān yá", m: "Tây Ban Nha", exH: "我打算明年去西班牙玩。", exP: "wǒ dǎ suàn míng nián qù xī bān yá wán.", exM: "Tôi dự định sang năm đi Tây Ban Nha chơi." },
        { h: "生日快樂", p: "shēng rì kuài lè", m: "Sinh nhật vui vẻ", exH: "祝你生日快樂，心想事成！", exP: "zhù nǐ shēng rì kuài lè, xīn xiǎng shì chéng!", exM: "Chúc bạn sinh nhật vui vẻ, cầu được ước thấy!" },
        { h: "我就是", p: "wǒ jiù shì", m: "Tôi chính là...", exH: "請問你是王先生嗎？我就是。", exP: "qǐng wèn nǐ shì wáng xiān shēng ma? wǒ jiù shì.", exM: "Xin hỏi ngài là ông Vương phải không? Tôi chính là đây." },
        { h: "好久不見", p: "hǎo jiǔ bú jiàn", m: "Lâu rồi không gặp", exH: "老朋友，好久不見！", exP: "lǎo péng you, hǎo jiǔ bú jiàn!", exM: "Bạn cũ, lâu rồi không gặp!" },
        { h: "不必客氣", p: "bú bì kè qì", m: "Không cần khách sáo", exH: "謝謝你的幫忙。不必客氣！", exP: "xiè xie nǐ de bāng máng. bú bì kè qì!", exM: "Cảm ơn sự giúp đỡ của bạn. Không cần khách sáo!" },
        { h: "禮物", p: "lǐ wù", m: "Quà tặng", exH: "這是我送給你的生日禮物。", exP: "zhè shì wǒ sòng gěi nǐ de shēng rì lǐ wù.", exM: "Đây là quà sinh nhật tôi tặng cho bạn." },
        { h: "今年", p: "jīn nián", m: "Năm nay", exH: "我今年二十歲。", exP: "wǒ jīn nián èr shí suì.", exM: "Năm nay tôi hai mươi tuổi." },
        { h: "訂", p: "dìng", m: "Đặt (trước)", exH: "我已經訂好餐廳了。", exP: "wǒ yǐ jīng dìng hǎo cān tīng le.", exM: "Tôi đã đặt xong nhà hàng rồi." },
        { h: "豬腳", p: "zhū jiǎo", m: "Chân giò lợn", exH: "台灣人過生日常吃豬腳麵線。", exP: "tái wān rén guò shēng rì cháng chī zhū jiǎo miàn xiàn.", exM: "Người Đài Loan đón sinh nhật thường ăn mì chân giò lợn." },
        { h: "麵線", p: "miàn xiàn", m: "Mì sợi nhỏ", exH: "這碗豬腳麵線很好吃。", exP: "zhè wǎn zhū jiǎo miàn xiàn hěn hǎo chī.", exM: "Bát mì chân giò lợn này rất ngon." },
        { h: "蛋", p: "dàn", m: "Trứng", exH: "早上我吃了一個蛋。", exP: "zǎo shang wǒ chī le yí ge dàn.", exM: "Buổi sáng tôi đã ăn một quả trứng." },
        { h: "一點", p: "yì diǎn", m: "Một chút", exH: "我會說一點中文。", exP: "wǒ huì shuō yì diǎn zhōng wén.", exM: "Tôi biết nói một chút tiếng Trung." },
        { h: "傳統", p: "chuán tǒng", m: "Truyền thống", exH: "這是我們國家的傳統。", exP: "zhè shì wǒ men guó jiā de chuán tǒng.", exM: "Đây là truyền thống của quốc gia chúng tôi." },
        { h: "年輕", p: "nián qīng", m: "Trẻ tuổi", exH: "這裡的老師都很年輕。", exP: "zhè lǐ de lǎo shī dōu hěn nián qīng.", exM: "Giáo viên ở đây đều rất trẻ." },
        { h: "蛋糕", p: "dàn gāo", m: "Bánh kem", exH: "媽媽給我買了一個大蛋糕。", exP: "mā ma gěi wǒ mǎi le yí ge dà dàn gāo.", exM: "Mẹ mua cho tôi một cái bánh kem lớn." },
        { h: "對", p: "duì", m: "Đúng / Đối với", exH: "吃水果對身體很好。", exP: "chī shuǐ guǒ duì shēn tǐ hěn hǎo.", exM: "Ăn hoa quả rất tốt cho cơ thể." },
        { h: "祝", p: "zhù", m: "Chúc", exH: "祝你萬事如意。", exP: "zhù nǐ wàn shì rú yì.", exM: "Chúc bạn vạn sự như ý." },
        { h: "哪裡", p: "nǎ lǐ", m: "Đâu có / Ở đâu", exH: "你的中文真好！哪裡，哪裡。", exP: "nǐ de zhōng wén zhēn hǎo! nǎ lǐ, nǎ lǐ.", exM: "Tiếng Trung của bạn thật tốt! Đâu có, đâu có (Dùng để khiêm tốn)." },
        { h: "大部分", p: "dà bù fèn", m: "Đại bộ phận / Phần lớn", exH: "大部分的學生都喜歡上網。", exP: "dà bù fèn de xué shēng dōu xǐ huan shàng wǎng.", exM: "Phần lớn học sinh đều thích lên mạng." },
        { h: "萬事如意", p: "wàn shì rú yì", m: "Vạn sự như ý", exH: "新年快樂，萬事如意！", exP: "xīn nián kuài lè, wàn shì rú yì!", exM: "Năm mới vui vẻ, vạn sự như ý!" },
        { h: "心想事成", p: "xīn xiǎng shì chéng", m: "Cầu được ước thấy", exH: "祝你生日快樂，心想事成！", exP: "zhù nǐ shēng rì kuài lè, xīn xiǎng shì chéng!", exM: "Chúc bạn sinh nhật vui vẻ, cầu được ước thấy!" }
    ];

    let questions = [];
    let currentIdx = 0;
    let repeatCount = 0;
    let timerInterval, seconds = 0;

    function clean(str) { return str.toLowerCase().replace(/[\s,\.\?!\uff0c\u3002\uff1f\uff01]/g, ''); }

    function init() {
        questions = [...rawData].sort(() => Math.random() - 0.5);
        document.getElementById('question-count').innerText = `Câu: 1/${questions.length}`;
        startTimer();
        render();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    function render() {
        const item = questions[currentIdx];
        document.getElementById('question-count').innerText = `Câu: ${currentIdx + 1}/${questions.length}`;
        document.getElementById('card-hanzi').innerText = item.h;
        document.getElementById('pinyin-input').value = "";
        document.getElementById('pinyin-input').disabled = false;
        document.getElementById('pinyin-input').className = "pinyin-input";
        document.getElementById('reveal-section').style.display = "none";
        document.getElementById('check-btn').style.display = "block";
        document.getElementById('giveup-btn').style.display = "block";
        document.getElementById('post-group').style.display = "none";
        document.getElementById('repeat-btn').disabled = false;
        document.getElementById('repeat-btn').innerText = "Lặp lại 🔁";
        document.getElementById('pinyin-input').focus();
    }

    // Phát âm
    function playAudio(type) {
        const item = questions[currentIdx];
        const textToRead = (type === 'vocab') ? item.h : item.exH;
        let msg = new SpeechSynthesisUtterance(textToRead);
        msg.lang = 'zh-TW'; 
        msg.rate = 0.8; // Đọc chậm một chút
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }

    function handleCheck() {
        const input = document.getElementById('pinyin-input');
        const item = questions[currentIdx];
        if (clean(input.value) === clean(item.p)) {
            input.className = "pinyin-input correct-input";
            showResult(false);
        } else {
            input.className = "pinyin-input wrong-input";
            setTimeout(() => { if(!input.disabled) input.className = "pinyin-input"; }, 500);
        }
    }

    function handleGiveUp() {
        showResult(true);
    }

    function showResult(isGiveUp) {
        const item = questions[currentIdx];
        const input = document.getElementById('pinyin-input');
        input.disabled = true;
        
        document.getElementById('reveal-section').style.display = "block";
        document.getElementById('vocab-pinyin').innerText = item.p;
        document.getElementById('vocab-meaning').innerText = item.m;
        
        document.getElementById('ex-hanzi').innerText = item.exH;
        document.getElementById('ex-pinyin').innerText = item.exP;
        document.getElementById('ex-meaning').innerText = item.exM;

        if(isGiveUp) {
            document.getElementById('diff-box').style.display = "block";
            document.getElementById('user-typed').innerText = input.value || "(Trống)";
            document.getElementById('correct-pinyin-reveal').innerText = item.p;
            input.value = item.p;
            input.classList.add('revealed-input');
        } else {
            document.getElementById('diff-box').style.display = "none";
        }

        document.getElementById('check-btn').style.display = "none";
        document.getElementById('giveup-btn').style.display = "none";
        document.getElementById('post-group').style.display = "flex";
    }

    function addRepeat() {
        questions.push(questions[currentIdx]);
        repeatCount++;
        const note = document.getElementById('repeat-note');
        note.style.display = "block";
        note.innerText = `Thẻ sẽ lặp lại ở cuối bài: ${repeatCount}`;
        document.getElementById('repeat-btn').disabled = true;
        document.getElementById('repeat-btn').innerText = "Đã thêm ✅";
        document.getElementById('question-count').innerText = `Câu: ${currentIdx + 1}/${questions.length}`;
    }

    function loadNext() {
        currentIdx++;
        if (currentIdx < questions.length) render();
        else {
            clearInterval(timerInterval);
            document.getElementById('quiz-box').style.display = "none";
            document.getElementById('result-box').style.display = "block";
            document.getElementById('final-time').innerText = `Thời gian hoàn thành: ${document.getElementById('timer').innerText}`;
        }
    }

    document.getElementById('pinyin-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            if(!document.getElementById('pinyin-input').disabled) handleCheck();
            else loadNext();
        }
    });

    init();
</script>
</body>
</html>
