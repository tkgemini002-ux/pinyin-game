<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Tiếng Trung Đáng Yêu 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fff0f5; --primary: #ff8da1; --secondary: #ffb6c1; --text-main: #5a3e46; --white: #ffffff; }
        body { background-color: var(--bg-color); background-image: radial-gradient(var(--secondary) 1.5px, transparent 1.5px); background-size: 25px 25px; font-family: 'Quicksand', sans-serif; color: var(--text-main); line-height: 1.8; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(255, 141, 161, 0.2); border: 2px solid var(--white); }
        h1 { text-align: center; color: var(--primary); font-size: 2.2rem; margin-bottom: 25px; }
        
        .controls-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; padding: 20px; background: #fff9fa; border-radius: 15px; border: 2px dashed var(--secondary); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .audio-buttons { display: flex; gap: 15px; }
        .btn-full-audio { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 141, 161, 0.4); transition: 0.2s; font-family: inherit; }
        .btn-full-audio:hover { transform: translateY(-3px); background: #ff728a; box-shadow: 0 6px 20px rgba(255, 141, 161, 0.6); }
        .btn-stop-audio { background: var(--secondary); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-stop-audio:hover { background: #ff91a4; transform: translateY(-2px); }
        
        .speed-control { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.1rem; color: var(--text-main); background: white; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--secondary); }
        input[type=range] { accent-color: var(--primary); cursor: pointer; }
        
        .reading-text { font-size: 1.4rem; text-align: justify; padding: 25px; background: #fff9fa; border-radius: 15px; border-left: 6px solid var(--primary); box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); line-height: 2.3; }
        
        .hanzi-char { cursor: pointer; transition: all 0.2s; display: inline-block; margin: 0 1px; border-bottom: 2px dashed transparent; }
        .hanzi-char:hover { color: var(--primary); transform: scale(1.2); font-weight: bold; border-bottom: 2px dashed var(--primary); background: #fff0f5; border-radius: 5px; }
        
        .highlight-word { background-color: var(--primary) !important; color: white !important; border-radius: 5px; padding: 0 4px; transform: scale(1.15); box-shadow: 0 3px 8px rgba(255, 141, 161, 0.5); border-bottom: none !important; font-weight: bold; z-index: 10; position: relative; }
        
        .scene-marker { color: #b78a96; font-size: 1.2rem; font-style: italic; }
        .speaker-name { color: #d66a81; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(90, 62, 70, 0.4); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--white); width: 90%; max-width: 550px; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(255, 141, 161, 0.4); position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 90vh; overflow-y: auto; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; cursor: pointer; color: var(--secondary); transition: 0.2s; }
        .close-btn:hover { color: var(--primary); transform: rotate(90deg); }
        .modal-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px dashed var(--secondary); padding-bottom: 20px; margin-bottom: 20px; }
        #character-target { width: 120px; height: 120px; background: #fff0f5; border-radius: 15px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .char-details h2 { margin: 0; color: var(--primary); font-size: 2.2rem; }
        .char-details .pinyin { font-size: 1.3rem; color: #888; font-style: italic; margin-bottom: 10px; }
        .btn-audio { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: 600; transition: 0.2s; box-shadow: 0 4px 10px rgba(255, 141, 161, 0.4); font-size: 1rem; }
        .btn-audio:hover { background: #ff728a; transform: translateY(-2px); }
        .info-section { margin-bottom: 18px; font-size: 1.1rem; }
        .info-section strong { color: var(--primary); font-size: 1.2rem;}
        .tree-container { display: flex; align-items: center; gap: 30px; margin-top: 20px; padding: 20px; background: #fff9fa; border-radius: 15px; border: 2px dashed var(--secondary); overflow-x: auto; }
        .tree-root { background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; font-weight: bold; font-size: 1.5rem; box-shadow: 0 5px 15px rgba(255, 141, 161, 0.4); flex-shrink: 0; position: relative; }
        .tree-branches { display: flex; flex-direction: column; gap: 15px; position: relative; }
        .tree-branches::before { content: ''; position: absolute; left: -30px; top: 50%; transform: translateY(-50%); width: 30px; height: 2px; background: var(--secondary); }
        .tree-branch { background: white; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--secondary); position: relative; box-shadow: 0 3px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; min-width: 150px; transition: 0.2s; }
        .tree-branch:hover { transform: translateX(5px); border-color: var(--primary); }
        .tree-branch::before { content: ''; position: absolute; left: -30px; top: 50%; width: 30px; height: 2px; background: var(--secondary); }
        .branch-header { display: flex; justify-content: space-between; align-items: center; }
        .branch-word { font-weight: bold; color: var(--text-main); font-size: 1.1rem; }
        .branch-btn-audio { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 0; margin-left: 10px; transition: 0.2s; }
        .branch-btn-audio:hover { transform: scale(1.3); }
        .branch-pinyin { font-size: 0.9rem; color: #888; font-style: italic; }
        .branch-meaning { font-size: 0.95rem; color: var(--primary); margin-top: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 Bài Đọc Nhỏ Xinh 🌸</h1>
        
        <div class="controls-container">
            <div class="audio-buttons">
                <button class="btn-full-audio" onclick="playFullText()">🔊 Bắt đầu nghe Hội thoại</button>
                <button class="btn-stop-audio" onclick="stopAudio()">⏹ Dừng</button>
            </div>
            <div class="speed-control">
                <label for="speedRate">🏃‍♀️ Tốc độ:</label>
                <input type="range" id="speedRate" min="0.5" max="1.5" step="0.1" value="0.9" oninput="updateSpeedLabel(this.value)">
                <span id="speedLabel" style="width: 35px;">0.9x</span>
            </div>
        </div>

        <div class="reading-text" id="text-container"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal()">✖</span>
            <div class="modal-header">
                <div id="character-target" title="Bấm để xem lại nét viết"></div>
                <div class="char-details">
                    <h2 id="modal-char">字</h2>
                    <div class="pinyin" id="modal-pinyin">zì</div>
                    <button class="btn-audio" onclick="playWord(currentChar)">🔊 Nghe chữ này</button>
                </div>
            </div>
            <div class="info-section"><strong>📝 Ý nghĩa:</strong> <span id="modal-meaning"></span></div>
            <div class="info-section"><strong>🎀 Cách dùng:</strong> <span id="modal-usage"></span></div>
            <div class="info-section" style="margin-top: 25px;">
                <strong>🌳 Bản đồ từ vựng:</strong>
                <div class="tree-container" id="tree-container"></div>
            </div>
        </div>
    </div>

    <script>
        const rawText = `【週末的臺北聚會】
(場景一：歡迎與喝茶)

張怡君： 李老師，您要喝茶，還是喝咖啡？

張怡君： 陳小姐，您呢？您要喝烏龍茶嗎？
陳月美： 對不起，我沒有喝茶。我喜歡喝美國咖啡。
王開文： 我也喝咖啡。
白茹玉： 我喝日本茶。有日本茶嗎？
張怡君： 對不起，沒有日本茶，這有台灣烏龍茶。台灣烏龍茶很好喝，要喝嗎？
白茹玉： 好啊，喝台灣烏龍茶。謝謝！
張怡君： 不客氣。這有兩部中文書。請看書。

(場景二：照片與家人)

張怡君： 伯母很好。謝謝。明天早上我去接伯母，可以嗎？
李明華： 可以。

田中誠一： 你好，我姓田中，名字叫田中誠一。我是日本人。
馬安同： 我是美國人。請問，李先生是哪國人？
李明華： 我是台灣人。
王開文： 我也是台灣人。
陳月美： 請問田中先生的姓名是什麼？
田中誠一： 我姓名是田中誠一。
陳月美： 田中先生，您好。

(場景四：週末運動與愛好)
李老師： 明天是週末。週末你們常做什麼？做運動嗎？
田中誠一： 是的，週末我常運動。我喜歡打球。
李老師： 你喜歡打神麼球？
田中誠一： 我喜歡打網球、打棒球，也喜歡打籃球。馬先生呢？
馬安同： 我沒有打球。我喜歡游泳，也喜歡踢足球。
王開文： 我覺得踢足球很好玩。明天早上我們一起去踢足球，好不好？
馬安同： 好啊。我們一起去運動。
白茹玉： 我沒有喜歡運動。我喜歡看書，也喜歡聽音樂。
陳月美： 你喜歡看什麼書？看中文書嗎？

(場景五：看電影與晚飯)

田中誠一： 我們先吃晚飯，也看電影。我們一起吃晚飯，可以嗎？

王開文： 這烏龍茶呢？

陳月美： 八十萬零三十五塊？這房子很漂亮。

李明華： 好。明天早上我去接家人，可以嗎？
張怡君： 可以，謝謝你。
李明華： 不客氣。
張怡君： 我們照相吧！一、二、三，照相！這照片都很好看！`;

        const dictionary = {};
        // Mã bảo vệ tuyệt đối không gây lỗi dù dữ liệu có thiếu hay thừa
        for (const [char, data] of Object.entries(rawDict)) {
            let relWords = [];
            if(data[3]) relWords.push({ word: data[3].split('|')[0], pinyin: data[3].split('|')[1], meaning: data[3].split('|')[2] });
            if(data[4]) relWords.push({ word: data[4].split('|')[0], pinyin: data[4].split('|')[1], meaning: data[4].split('|')[2] });
            if(data[5]) relWords.push({ word: data[5].split('|')[0], pinyin: data[5].split('|')[1], meaning: data[5].split('|')[2] });
            
            dictionary[char] = { pinyin: data[0], meaning: data[1], usage: data[2], related: relWords };
        }

        function getCharInfo(char) {
            if (dictionary[char]) return dictionary[char];
            return { pinyin: '...', meaning: 'Chưa có thông tin nghĩa cho từ này.', usage: 'Từ này cần được cập nhật thêm vào kho dữ liệu.', related: [ { word: char, pinyin: '', meaning: 'Tra cứu thêm' } ] };
        }

        window.storyTextOnly = "";
        
        function renderText() {
            let html = '';
            const lines = rawText.split('\n');
            window.storyTextOnly = "";
            
            for (let line of lines) {
                line = line.trim();
                if(!line) { html += '<br>'; continue; }
                
                if (line.startsWith('【') && line.endsWith('】')) {
                    html += '<div class="scene-marker">';
                    for(let char of line) {
                        if (/[\u4E00-\u9FA5]/.test(char)) html += `<span class="hanzi-char" onclick="openModal('${char}')">${char}</span>`;
                        else html += char;
                    }
                    html += '</div>';
                    continue;
                }

                let inBracket = false;
                let beforeColon = true;
                if(!line.includes('：')) beforeColon = false;
                
                let lineHtml = '';
                for(let i=0; i<line.length; i++){
                    let char = line[i];
                    if (char === '【' || char === '(' || char === '（') inBracket = true;
                    
                    let isSpoken = !inBracket && !beforeColon;
                    if(char === '：' && beforeColon) {
                        isSpoken = false; 
                        beforeColon = false; 
                    }
                    
                    let isHanzi = /[\u4E00-\u9FA5]/.test(char);
                    let clickEvt = isHanzi ? `onclick="openModal('${char}')"` : "";
                    let classes = isHanzi ? "hanzi-char" : "";
                    
                    if (isSpoken) {
                        lineHtml += `<span class="${classes}" data-idx="${window.storyTextOnly.length}" ${clickEvt}>${char}</span>`;
                        window.storyTextOnly += char;
                    } else {
                        if (inBracket || char === '：' || beforeColon) {
                            lineHtml += `<span class="speaker-name ${classes}" ${clickEvt}>${char}</span>`;
                        } else {
                            lineHtml += `<span class="${classes}" ${clickEvt}>${char}</span>`;
                        }
                    }
                    
                    if (char === '】' || char === ')' || char === '）') inBracket = false;
                }
                html += `<div>${lineHtml}</div>`;
                
                if(window.storyTextOnly.length > 0 && !window.storyTextOnly.endsWith(' ')) {
                    window.storyTextOnly += ' '; 
                }
            }
            document.getElementById('text-container').innerHTML = html;
        }

        let writer; let currentChar = '';
        function openModal(char) {
            currentChar = char;
            const info = getCharInfo(char);
            document.getElementById('modal-char').innerText = char;
            document.getElementById('modal-pinyin').innerText = info.pinyin;
            document.getElementById('modal-meaning').innerText = info.meaning;
            document.getElementById('modal-usage').innerText = info.usage;

            let treeHtml = `<div class="tree-root">${char}</div><div class="tree-branches">`;
            info.related.forEach(item => {
                treeHtml += `<div class="tree-branch"><div class="branch-header"><span class="branch-word">${item.word}</span><button class="branch-btn-audio" onclick="playWord('${item.word}')" title="Nghe từ này">🔊</button></div><span class="branch-pinyin">${item.pinyin}</span><span class="branch-meaning">${item.meaning}</span></div>`;
            });
            treeHtml += `</div>`;
            document.getElementById('tree-container').innerHTML = treeHtml;

            document.getElementById('modal').style.display = 'flex';
            document.getElementById('character-target').innerHTML = '';
            
            writer = HanziWriter.create('character-target', char, { width: 120, height: 120, padding: 5, strokeColor: '#ff8da1', radicalColor: '#ff69b4', delayBetweenStrokes: 200, showOutline: true });
            writer.animateCharacter();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('modal')) closeModal(); }
        document.getElementById('character-target').addEventListener('click', function() { if(writer) writer.animateCharacter(); });

        function updateSpeedLabel(val) { document.getElementById('speedLabel').innerText = val + 'x'; }
        function clearHighlights() { document.querySelectorAll('.highlight-word').forEach(el => el.classList.remove('highlight-word')); }

        function playWord(wordText) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(wordText);
            msg.lang = 'zh-TW'; 
            msg.rate = parseFloat(document.getElementById('speedRate').value);    
            window.speechSynthesis.speak(msg);
        }

        function stopAudio() {
            window.speechSynthesis.cancel();
            clearHighlights();
        }

        function playFullText() {
            window.speechSynthesis.cancel();
            clearHighlights();
            
            const msg = new SpeechSynthesisUtterance(window.storyTextOnly);
            msg.lang = 'zh-TW'; 
            msg.rate = parseFloat(document.getElementById('speedRate').value);
            
            msg.onboundary = function(event) {
                if (event.name === 'word' || event.name === 'sentence') {
                    clearHighlights();
                    let start = event.charIndex;
                    let len = event.charLength || 1; 
                    
                    for (let i = 0; i < len; i++) {
                        let span = document.querySelector(`span[data-idx="${start + i}"]`);
                        if (span && span.classList.contains('hanzi-char')) {
                            span.classList.add('highlight-word');
                        }
                    }
                }
            };
            
            msg.onend = function() { clearHighlights(); };
            window.speechSynthesis.speak(msg);
        }

        renderText();
    </script>
