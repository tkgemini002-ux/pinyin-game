<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng Tiếng Trung - Pink & Blue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --pink-light: #FFE4E1;
            --pink-dark: #FFB6C1;
            --blue-light: #E0F7FA;
            --blue-dark: #81D4FA;
            --text-main: #4A4A4A;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--blue-light) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        h1 {
            color: #d87093;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background-color: var(--pink-dark);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--blue-dark);
            transform: translateY(-2px);
        }

        .active-btn {
            background-color: var(--blue-dark);
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            height: 65vh;
            position: relative;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 3px solid var(--pink-light);
        }

        #mindmap-view {
            width: 100%;
            height: 100%;
            display: none;
        }

        #flashcard-view {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .flashcard {
            width: 350px;
            height: 480px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card-front {
            background: linear-gradient(to bottom right, #ffffff, var(--pink-light));
            border: 2px solid var(--pink-dark);
        }

        .card-back {
            background: linear-gradient(to bottom right, #ffffff, var(--blue-light));
            border: 2px solid var(--blue-dark);
            transform: rotateY(180deg);
            justify-content: flex-start;
            overflow-y: auto;
        }

        .icon-large {
            font-size: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        .hanzi-large {
            font-size: 60px;
            font-weight: bold;
            color: #333;
            letter-spacing: 5px;
        }

        .card-back .hanzi-medium {
            font-size: 40px;
            font-weight: bold;
            margin-top: 10px;
        }

        .pinyin {
            font-size: 24px;
            color: #d87093;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .meaning {
            font-size: 22px;
            font-weight: bold;
            color: var(--blue-dark);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            font-size: 15px;
            line-height: 1.4;
        }

        .info-title {
            font-weight: bold;
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 3px;
        }

        .audio-btn {
            margin-top: auto;
            margin-bottom: 10px;
            background-color: var(--blue-dark);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .audio-btn:hover {
            background-color: var(--pink-dark);
        }

        .fc-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .counter {
            margin-top: 10px;
            font-weight: bold;
            color: #d87093;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎀 Trạm Từ Vựng Phồn Thể 🎀</h1>
        <div class="controls">
            <button id="btn-flashcard" class="active-btn" onclick="switchView('flashcard')">Flashcard</button>
            <button id="btn-mindmap" onclick="switchView('mindmap')">Mindmap</button>
        </div>
    </header>

    <div class="main-container">
        <div id="mindmap-view"></div>

        <div id="flashcard-view">
            <div class="flashcard" id="flashcard" onclick="flipCard(event)">
                <div class="card-face card-front">
                    <div class="icon-large" id="fc-icon">🍎</div>
                    <div class="hanzi-large" id="fc-hanzi-front">水果</div>
                </div>
                <div class="card-face card-back">
                    <div class="hanzi-medium" id="fc-hanzi-back">水果</div>
                    <div class="pinyin" id="fc-pinyin">shuǐ guǒ</div>
                    <div class="meaning" id="fc-meaning">Trái cây</div>
                    
                    <div class="info-box">
                        <div class="info-title"><i class="fa-solid fa-book-open"></i> Ví dụ</div>
                        <span id="fc-example">台灣的水果很好吃。(Trái cây Đài Loan rất ngon.)</span>
                    </div>

                    <div class="info-box">
                        <div class="info-title"><i class="fa-solid fa-tree"></i> Nguồn gốc / Mẹo nhớ</div>
                        <span id="fc-etymology">水 (Thủy - nước) + 果 (Quả - trái).</span>
                    </div>

                    <button class="audio-btn" onclick="playAudio(event)">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
            </div>
            
            <div class="fc-controls">
                <button onclick="prevCard()"><i class="fa-solid fa-arrow-left"></i> Trước</button>
                <button onclick="nextCard()">Tiếp <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="counter" id="card-counter">1 / 57</div>
        </div>
    </div>

    <script>
        // Toàn bộ 57 từ vựng bạn đã yêu cầu
        const vocabData = [
            { id: 1, word: "水果", pinyin: "shuǐ guǒ", meaning: "Trái cây", example: "台灣的水果很甜。", etymology: "水 (Nước) + 果 (Trái cây).", icon: "🍎" },
            { id: 2, word: "黃色", pinyin: "huáng sè", meaning: "Màu vàng", example: "我喜歡黃色的衣服。", etymology: "黃 (Vàng) + 色 (Màu sắc).", icon: "🟨" },
            { id: 3, word: "芒果", pinyin: "máng guǒ", meaning: "Xoài", example: "夏天吃芒果冰很好吃。", etymology: "芒 (Cỏ mang) + 果 (Quả).", icon: "🥭" },
            { id: 4, word: "給", pinyin: "gěi", meaning: "Cho, đưa", example: "請把那本書給我。", etymology: "Bộ Mịch (sợi tơ) kết hợp chữ Hợp (tụ lại).", icon: "🤲" },
            { id: 5, word: "香甜", pinyin: "xiāng tián", meaning: "Thơm ngọt", example: "這個西瓜很香甜。", etymology: "香 (Thơm) + 甜 (Ngọt).", icon: "🍯" },
            { id: 6, word: "紅色", pinyin: "hóng sè", meaning: "Màu đỏ", example: "紅色的外套很漂亮。", etymology: "紅 (Đỏ) + 色 (Màu sắc).", icon: "🟥" },
            { id: 7, word: "西瓜", pinyin: "xī guā", meaning: "Dưa hấu", example: "天氣熱，我們吃西瓜吧。", etymology: "西 (Phía Tây) + 瓜 (Dưa). Dưa đến từ phương Tây.", icon: "🍉" },
            { id: 8, word: "以前", pinyin: "yǐ qián", meaning: "Trước đây", example: "我以前住在台北。", etymology: "以 (Lấy mốc) + 前 (Phía trước).", icon: "⏳" },
            { id: 9, word: "機會", pinyin: "jī huì", meaning: "Cơ hội", example: "這是一個好機會。", etymology: "機 (Bộ máy/Thời cơ) + 會 (Gặp gỡ).", icon: "🍀" },
            { id: 10, word: "吃吃看", pinyin: "chī chī kàn", meaning: "Ăn thử", example: "你吃吃看這個芒果。", etymology: "Lặp từ 吃 (Ăn) + 看 (Xem).", icon: "😋" },
            { id: 11, word: "拍", pinyin: "pāi", meaning: "Chụp (ảnh), vỗ", example: "幫我拍一張照片好嗎？", etymology: "Bộ Thủ (tay) + chữ Bạch (màu trắng). Dùng tay vỗ.", icon: "📸" },
            { id: 12, word: "笑", pinyin: "xiào", meaning: "Cười", example: "他笑得很開心。", etymology: "Bộ Trúc ở trên, bộ Yểu ở dưới.", icon: "😄" },
            { id: 13, word: "開心", pinyin: "kāi xīn", meaning: "Vui vẻ", example: "今天我很開心。", etymology: "開 (Mở) + 心 (Lòng). Mở lòng ra là vui.", icon: "🥰" },
            { id: 14, word: "穿", pinyin: "chuān", meaning: "Mặc", example: "外面很冷，多穿衣服。", etymology: "Bộ Huyệt (cái hang) + chữ Nha (răng). Đâm xuyên qua (mặc).", icon: "👕" },
            { id: 15, word: "衣服", pinyin: "yī fú", meaning: "Quần áo", example: "這件衣服很乾淨。", etymology: "衣 (Áo) + 服 (Phục).", icon: "👗" },
            { id: 16, word: "旅館", pinyin: "lǚ guǎn", meaning: "Khách sạn, nhà nghỉ", example: "這家旅館很便宜。", etymology: "旅 (Du lịch) + 館 (Quán/Nhà).", icon: "🏨" },
            { id: 17, word: "太太", pinyin: "tài tai", meaning: "Vợ, bà (xưng hô)", example: "林太太，您好！", etymology: "Lặp chữ Thái (Lớn). Gọi người phụ nữ một cách tôn trọng.", icon: "👩" },
            { id: 18, word: "男", pinyin: "nán", meaning: "Nam (Giới tính)", example: "那個男生很高。", etymology: "Điền (ruộng) + Lực (sức mạnh). Người có sức cày ruộng là nam.", icon: "👨" },
            { id: 19, word: "矮", pinyin: "ǎi", meaning: "Thấp, lùn", example: "弟弟比我矮。", etymology: "Bộ Thỉ (mũi tên) + chữ Ủy.", icon: "📉" },
            { id: 20, word: "弟弟", pinyin: "dì di", meaning: "Em trai", example: "我弟弟喜歡打籃球。", etymology: "Tượng hình cột gỗ được buộc dây thừng.", icon: "👦" },
            { id: 21, word: "乾淨", pinyin: "gān jìng", meaning: "Sạch sẽ", example: "我的房間很乾淨。", etymology: "乾 (Khô ráo) + 淨 (Sạch).", icon: "✨" },
            { id: 22, word: "窗戶", pinyin: "chuāng hù", meaning: "Cửa sổ", example: "請把窗戶打開。", etymology: "窗 (Cửa sổ) + 戶 (Cửa một cánh).", icon: "🪟" },
            { id: 23, word: "往", pinyin: "wǎng", meaning: "Hướng về", example: "一直往前走。", etymology: "Bộ Xích (bước đi) + chữ Chủ.", icon: "➡️" },
            { id: 24, word: "藍色", pinyin: "lán sè", meaning: "Màu xanh dương", example: "天空是藍色的。", etymology: "藍 (Màu xanh/Cây chàm) + 色 (Màu).", icon: "🟦" },
            { id: 25, word: "因為", pinyin: "yīn wèi", meaning: "Bởi vì", example: "因為下雨，所以我沒去。", etymology: "因 (Nguyên do) + 為 (Vì).", icon: "🤔" },
            { id: 26, word: "住", pinyin: "zhù", meaning: "Ở, sống", example: "你住在哪裡？", etymology: "Bộ Nhân đứng (người) + chữ Chủ. Nơi người làm chủ.", icon: "🏡" },
            { id: 27, word: "上個月", pinyin: "shàng ge yuè", meaning: "Tháng trước", example: "我上個月去台南。", etymology: "上 (Trên/Trước) + 個 (lượng từ) + 月 (Tháng).", icon: "📅" },
            { id: 28, word: "這些", pinyin: "zhè xiē", meaning: "Những cái này", example: "這些水果是誰買的？", etymology: "這 (Này) + 些 (Một vài).", icon: "📦" },
            { id: 29, word: "租", pinyin: "zū", meaning: "Thuê", example: "我想租一間套房。", etymology: "Bộ Hòa (cây lúa) + chữ Thả.", icon: "🔑" },
            { id: 30, word: "房東", pinyin: "fáng dōng", meaning: "Chủ nhà", example: "房東住在二樓。", etymology: "房 (Phòng) + 東 (Đông/Chủ nhân).", icon: "🗝️" },
            { id: 31, word: "客廳", pinyin: "kè tīng", meaning: "Phòng khách", example: "客廳裡有一台電視。", etymology: "客 (Khách) + 廳 (Sảnh).", icon: "🛋️" },
            { id: 32, word: "廚房", pinyin: "chú fáng", meaning: "Phòng bếp", example: "媽媽在廚房做飯。", etymology: "廚 (Chỗ nấu ăn) + 房 (Phòng).", icon: "🍳" },
            { id: 33, word: "左邊", pinyin: "zuǒ biān", meaning: "Bên trái", example: "超市在圖書館的左邊。", etymology: "左 (Trái) + 邊 (Bên).", icon: "⬅️" },
            { id: 34, word: "右邊", pinyin: "yòu biān", meaning: "Bên phải", example: "浴室在客廳的右邊。", etymology: "右 (Phải) + 邊 (Bên).", icon: "➡️" },
            { id: 35, word: "浴室", pinyin: "yù shì", meaning: "Phòng tắm", example: "這間套房有自己的浴室。", etymology: "浴 (Tắm) + 室 (Phòng).", icon: "🚿" },
            { id: 36, word: "超市", pinyin: "chāo shì", meaning: "Siêu thị", example: "我去超市買東西。", etymology: "超 (Siêu) + 市 (Thị/Chợ).", icon: "🛒" },
            { id: 37, word: "走路", pinyin: "zǒu lù", meaning: "Đi bộ", example: "走路去捷運站只要五分鐘。", etymology: "走 (Đi) + 路 (Đường).", icon: "🚶‍♀️" },
            { id: 38, word: "分鐘", pinyin: "fēn zhōng", meaning: "Phút", example: "請等我十分鐘。", etymology: "分 (Phân) + 鐘 (Chung/Đồng hồ).", icon: "⏱️" },
            { id: 39, word: "套房", pinyin: "tào fáng", meaning: "Căn hộ khép kín", example: "我在找一間有網路的套房。", etymology: "套 (Vỏ bọc/Bộ) + 房 (Phòng). Phòng có đầy đủ nhà vệ sinh.", icon: "🚪" },
            { id: 40, word: "再", pinyin: "zài", meaning: "Lại, nữa (hành động lặp lại trong tương lai)", example: "歡迎下次再來。", etymology: "Chữ Nhất và chữ Nhiễm (cấu trúc tượng hình).", icon: "🔄" },
            { id: 41, word: "電話", pinyin: "diàn huà", meaning: "Điện thoại", example: "這是我的電話號碼。", etymology: "電 (Điện) + 話 (Lời nói).", icon: "📱" },
            { id: 42, word: "林", pinyin: "Lín", meaning: "Họ Lâm / Rừng", example: "林小姐，你好。", etymology: "Hai chữ Mộc (木) ghép lại thành Rừng.", icon: "🌲" },
            { id: 43, word: "打電話", pinyin: "dǎ diàn huà", meaning: "Gọi điện thoại", example: "我晚上會給你打電話。", etymology: "打 (Đánh/Thực hiện) + 電話 (Điện thoại).", icon: "📞" },
            { id: 44, word: "喂", pinyin: "wéi", meaning: "Alo (nghe điện thoại)", example: "喂，請問找哪位？", etymology: "Bộ Khẩu (miệng) + chữ Úy.", icon: "🗣️" },
            { id: 45, word: "房租", pinyin: "fáng zū", meaning: "Tiền thuê nhà", example: "這個月的房租是多少？", etymology: "房 (Phòng) + 租 (Thuê).", icon: "💰" },
            { id: 46, word: "已經", pinyin: "yǐ jīng", meaning: "Đã", example: "我已經吃過飯了。", etymology: "已 (Đã xong) + 經 (Trải qua).", icon: "✔️" },
            { id: 47, word: "習慣", pinyin: "xí guàn", meaning: "Thói quen, quen với", example: "我習慣早起。", etymology: "習 (Học tập/Luyện tập) + 慣 (Quen).", icon: "🧘‍♀️" },
            { id: 48, word: "問題", pinyin: "wèn tí", meaning: "Vấn đề, câu hỏi", example: "你有什麼問題嗎？", etymology: "問 (Hỏi) + 題 (Chủ đề).", icon: "❓" },
            { id: 49, word: "熱水器", pinyin: "rè shuǐ qì", meaning: "Bình nóng lạnh", example: "浴室的熱水器壞了。", etymology: "熱 (Nóng) + 水 (Nước) + 器 (Thiết bị).", icon: "♨️" },
            { id: 50, word: "好像", pinyin: "hǎo xiàng", meaning: "Hình như, có vẻ", example: "好像快要下雨了。", etymology: "好 (Rất) + 像 (Giống).", icon: "💭" },
            { id: 51, word: "裝", pinyin: "zhuāng", meaning: "Lắp đặt, đóng gói", example: "房東昨天裝了新的冷氣。", etymology: "Bộ Y (áo) ở dưới, chữ Tráng ở trên.", icon: "🔧" },
            { id: 52, word: "不過", pinyin: "bú guò", meaning: "Nhưng (chuyển ngữ khí nhẹ)", example: "這件衣服很好看，不過有點貴。", etymology: "不 (Không) + 過 (Qua).", icon: "✋" },
            { id: 53, word: "付", pinyin: "fù", meaning: "Thanh toán", example: "請問要在哪裡付錢？", etymology: "Bộ Nhân đứng + chữ Thốn. Đưa đồ cho người khác.", icon: "💳" },
            { id: 54, word: "收到", pinyin: "shōu dào", meaning: "Nhận được", example: "我收到你的信了。", etymology: "收 (Thu lấy) + 到 (Đến).", icon: "📥" },
            { id: 55, word: "不好意思", pinyin: "bù hǎo yì si", meaning: "Ngại quá, xin lỗi", example: "不好意思，讓你久等了。", etymology: "Không có ý tốt (ngại ngùng).", icon: "😳" },
            { id: 56, word: "沒關係", pinyin: "méi guān xi", meaning: "Không sao đâu", example: "A: 對不起。 B: 沒關係。", etymology: "沒 (Không có) + 關係 (Quan hệ/Ảnh hưởng).", icon: "👌" },
            { id: 57, word: "有線電視", pinyin: "yǒu xiàn diàn shì", meaning: "Truyền hình cáp", example: "我的套房有有線電視。", etymology: "有線 (Có dây) + 電視 (Tivi).", icon: "📺" }
        ];

        let currentIndex = 0;

        function updateCounter() {
            document.getElementById('card-counter').textContent = `${currentIndex + 1} / ${vocabData.length}`;
        }

        function loadCard(index) {
            const card = vocabData[index];
            document.getElementById('fc-icon').textContent = card.icon;
            document.getElementById('fc-hanzi-front').textContent = card.word;
            document.getElementById('fc-hanzi-back').textContent = card.word;
            document.getElementById('fc-pinyin').textContent = card.pinyin;
            document.getElementById('fc-meaning').textContent = card.meaning;
            document.getElementById('fc-example').textContent = card.example;
            document.getElementById('fc-etymology').textContent = card.etymology;
            
            document.getElementById('flashcard').classList.remove('is-flipped');
            updateCounter();
        }

        function flipCard(event) {
            document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % vocabData.length;
            loadCard(currentIndex);
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + vocabData.length) % vocabData.length;
            loadCard(currentIndex);
        }

        function playAudio(event) {
            event.stopPropagation(); 
            const textToSpeak = vocabData[currentIndex].word;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'zh-TW'; 
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Trình duyệt của bạn không hỗ trợ phát âm.");
            }
        }

        let network = null;
        function initMindmap() {
            const container = document.getElementById('mindmap-view');
            
            let nodesArray = [{ id: 0, label: "🌟\nTỪ VỰNG", shape: 'circle', color: '#FFB6C1', font: {size: 20, bold: true} }];
            let edgesArray = [];

            vocabData.forEach((item) => {
                nodesArray.push({
                    id: item.id,
                    label: item.icon + "\n" + item.word,
                    shape: 'box',
                    color: '#E0F7FA',
                    font: { size: 16, face: 'Segoe UI' },
                    borderWidth: 2,
                    color: { border: '#81D4FA', background: '#FFFFFF' }
                });
                
                edgesArray.push({
                    from: 0,
                    to: item.id,
                    color: { color: '#FFB6C1' },
                    width: 1
                });
            });

            const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) };
            const options = {
                physics: { 
                    stabilization: false, 
                    barnesHut: { 
                        gravitationalConstant: -2000,
                        springLength: 150 
                    } 
                },
                interaction: { hover: true }
            };

            network = new vis.Network(container, data, options);
            
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    if (nodeId !== 0) {
                        const index = vocabData.findIndex(v => v.id === nodeId);
                        if (index !== -1) {
                            currentIndex = index;
                            loadCard(currentIndex);
                            switchView('flashcard');
                        }
                    }
                }
            });
        }

        function switchView(viewName) {
            document.getElementById('flashcard-view').style.display = viewName === 'flashcard' ? 'flex' : 'none';
            document.getElementById('mindmap-view').style.display = viewName === 'mindmap' ? 'block' : 'none';
            
            document.getElementById('btn-flashcard').classList.toggle('active-btn', viewName === 'flashcard');
            document.getElementById('btn-mindmap').classList.toggle('active-btn', viewName === 'mindmap');

            if (viewName === 'mindmap' && !network) {
                initMindmap();
            }
        }

        // Bắt sự kiện phím mũi tên để lật card nhanh
        document.addEventListener('keydown', function(event) {
            if (document.getElementById('flashcard-view').style.display !== 'none') {
                if (event.key === 'ArrowRight') {
                    nextCard();
                } else if (event.key === 'ArrowLeft') {
                    prevCard();
                } else if (event.key === ' ' || event.key === 'Enter') {
                    event.preventDefault();
                    flipCard();
                }
            }
        });

        loadCard(currentIndex);
    </script>
</body>
</html>
