<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinyin Master Pro - Trinh Phục Chữ Hán</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --bg: #f9f9fc;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: #2d3436;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        #start-screen { display: block; }
        .level-btn {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            color: white;
        }
        .btn-easy { background: #00cec9; }
        .btn-med { background: #fdcb6e; color: #2d3436; }
        .btn-hard { background: #e17055; }
        .level-btn:hover { transform: scale(1.05); }

        #game-screen { display: none; }
        .chibi-cat {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            transition: all 0.3s ease;
            background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=blackcat&backgroundColor=transparent');
        }
        .illustration {
            width: 100px;
            height: 100px;
            margin: 10px auto;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .hanzi-display {
            font-size: 60px;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
        }
        .pinyin-display {
            font-size: 36px;
            color: #636e72;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .play-audio-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            margin-bottom: 20px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: #f1f2f6;
            border: 2px solid #dfe4ea;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }

        .feedback {
            font-size: 16px;
            min-height: 50px;
            color: #2d3436;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
        }
        .next-btn {
            background: #2d3436;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>🐾 Pinyin Master</h1>
        <p>Chọn cấp độ để bắt đầu hành trình!</p>
        <button class="level-btn btn-easy" onclick="startGame('easy')">🌱 Dễ (50 từ - Thanh mẫu)</button>
        <button class="level-btn btn-med" onclick="startGame('med')">🔥 Trung Bình (50 từ - Vận mẫu & Thanh điệu)</button>
        <button class="level-btn btn-hard" onclick="startGame('hard')">☠️ Khó (50 từ - Hòa trộn khắc nghiệt)</button>
    </div>

    <div id="game-screen">
        <div class="chibi-cat" id="cat-mascot"></div>
        <img id="word-img" class="illustration" src="" alt="Minh họa">

        <div class="hanzi-display" id="hanzi-text">貓</div>
        <div class="pinyin-display" id="pinyin-text">_āo</div>

        <button class="play-audio-btn" onclick="playCurrentWord()">🔊 Nghe Câu Hỏi</button>

        <div class="options-grid" id="options-container"></div>

        <div class="feedback" id="feedback-text">Nghe và chọn đáp án chính xác!</div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu Tiếp Theo ➔</button>
    </div>
</div>

    let currentQuestions = [];
    let qIndex = 0;
    let isProcessing = false;

    const catEmotions = {
        normal: "https://api.dicebear.com/7.x/bottts/svg?seed=blackcat&backgroundColor=transparent",
        happy: "https://api.dicebear.com/7.x/bottts/svg?seed=happycat&backgroundColor=e2f5ec",
        sad: "https://api.dicebear.com/7.x/bottts/svg?seed=sadcat&backgroundColor=ffeded"
    };

    function startGame(level) {
        currentQuestions = database.filter(q => q.level === level);
        qIndex = 0;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        isProcessing = false;
        const q = currentQuestions[qIndex];

        document.getElementById('cat-mascot').style.backgroundImage = `url('${catEmotions.normal}')`;
        document.getElementById('word-img').src = q.img;
        document.getElementById('hanzi-text').innerText = q.hanzi;
        document.getElementById('pinyin-text').innerText = q.missingPart;
        document.getElementById('feedback-text').innerText = "Nghe và chọn đáp án chính xác!";
        document.getElementById('feedback-text').style.background = "transparent";
        document.getElementById('next-btn').style.display = "none";

        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';

        q.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(idx, btn);
            optContainer.appendChild(btn);
        });

        setTimeout(playCurrentWord, 500);
    }

    function playAudio(text) {
        return new Promise(resolve => {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.8;
            utterance.onend = resolve;
            utterance.onerror = resolve;
            window.speechSynthesis.speak(utterance);
            setTimeout(resolve, 1500);
        });
    }

    function playCurrentWord() {
        playAudio(currentQuestions[qIndex].pinyinFull);
    }

    async function playAllOptionsForComparison(q) {
        const feedback = document.getElementById('feedback-text');
        for(let i = 0; i < q.fullSounds.length; i++) {
            feedback.innerHTML = `Đang nghe thử: <strong>${q.fullSounds[i]}</strong> (${q.options[i]})`;
            await playAudio(q.fullSounds[i]);
            await new Promise(r => setTimeout(r, 600));
        }
        feedback.innerHTML = `Giờ hãy nghe lại từ gốc <strong>${q.pinyinFull}</strong>!`;
        await playAudio(q.pinyinFull);
        isProcessing = false;
    }

    async function handleAnswer(selectedIndex, btnElement) {
        if (isProcessing) return;

        const q = currentQuestions[qIndex];
        const feedback = document.getElementById('feedback-text');

        if (selectedIndex === q.correctIdx) {
            isProcessing = true;
            btnElement.classList.add('correct');
            document.getElementById('cat-mascot').style.backgroundImage = `url('${catEmotions.happy}')`;
            feedback.innerHTML = `✅ <strong>Chính xác!</strong> ${q.exp}`;
            feedback.style.background = "#e2f5ec";
            document.getElementById('next-btn').style.display = "block";
            playCurrentWord();
        } else {
            isProcessing = true;
            btnElement.classList.add('wrong');
            document.getElementById('cat-mascot').style.backgroundImage = `url('${catEmotions.sad}')`;
            feedback.style.background = "#ffeded";
            feedback.innerHTML = `❌ Sai rồi! Hệ thống sẽ đọc toàn bộ 4 phương án ghép lại để bạn phân biệt nhé...`;
            await playAllOptionsForComparison(q);
        }
    }

    function nextQuestion() {
        qIndex++;
        if (qIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            document.getElementById('game-screen').innerHTML = `
                <div class="hanzi-display">🎉</div>
                <h2>Hoàn thành xuất sắc!</h2>
                <p>Bạn đã vượt qua 50 câu hỏi của cấp độ này.</p>
                <button class="play-audio-btn" onclick="location.reload()">Trở về Trang Chủ</button>
            `;
        }
    }
</script>
